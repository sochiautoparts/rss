name: Update RSS Feed (self-perpetuating)

# ─────────────────────────────────────────────────────────────────────────────
# HOW THIS WORKS — the 30-minute self-perpetuating loop
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions `schedule:` cron is unreliable on the free tier: scheduled
# runs are frequently delayed or skipped entirely (verified: zero schedule
# firings in the first 3+ hours of this repo's life).
#
# Solution: the workflow triggers ITSELF. After generating the feed, the final
# step sleeps 30 minutes, then calls the workflow_dispatch API to queue the
# next run. This creates a self-sustaining chain that fires reliably every
# ~30 minutes, independent of GitHub's cron scheduler.
#
#   run N ──> generate feed ──> commit ──> sleep 1800s ──> trigger run N+1 ──> ...
#
# Feed freshness: served via raw.githubusercontent.com (cache 5 min).
# jsDelivr is NOT used — its multi-tier distributed cache returns stale content
# even after successful purge (verified empirically).
#
# Safety nets:
#   - `schedule` every hour: if the chain breaks (run fails to self-trigger),
#     the hourly cron restarts it. Chain self-heals within ≤60 min.
#   - `workflow_dispatch`: manual kickstart / debugging.
#   - `concurrency`: prevents overlapping runs from piling up.
#
# Minutes cost: ~31 min per run on public repo = FREE (unlimited minutes).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    # Hourly safety net — restarts the chain if it ever breaks.
    # Uses :07 (off-peak) instead of :00 to avoid GitHub cron congestion.
    - cron: "7 * * * *"
  push:
    branches: [main]
    paths:
      - "generate_feed.py"
      - "requirements.txt"
      - ".github/workflows/update-feed.yml"

permissions:
  contents: write   # commit feed.xml + last-run.json
  actions: write    # trigger the next workflow_dispatch run (self-perpetuation)

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate feed
        run: python generate_feed.py

      - name: Write heartbeat marker (proves the loop is alive)
        run: |
          python - <<'PY'
          import json, datetime
          data = {
              "last_run_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(timespec="seconds"),
              "trigger": "${{ github.event_name }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "loop_mode": "self-perpetuating, ~30 min cycle",
              "next_run_expected_in": "30 minutes (sleep 1800 + self-trigger)",
          }
          with open("last-run.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")
          print("heartbeat:", data)
          PY

      - name: Commit feed.xml + heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml last-run.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit (feed identical to previous run)."
          else
            git commit -m "chore(feed): auto-update $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event_name }}]"
            git push
          fi

      - name: Sleep 30 minutes, then trigger the next run (self-perpetuation)
        if: always()
        run: |
          echo "============================================================"
          echo "  Feed generated. Now sleeping 30 min before next cycle."
          echo "  Started sleep at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Expected wake:    $(date -u -d '+30 minutes' '+%Y-%m-%d %H:%M:%S UTC')"
          echo "============================================================"
          sleep 1800
          echo "============================================================"
          echo "  Woke up at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Triggering next run via workflow_dispatch API..."
          echo "============================================================"
          RESPONSE=$(curl -sS -o /tmp/dispatch_resp.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-feed.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "Dispatch API response: HTTP $RESPONSE (204 = success, next run queued)"
          if [ "$RESPONSE" != "204" ]; then
            echo "⚠️  WARNING: self-trigger failed. Chain may break."
            echo "  Response body:"
            cat /tmp/dispatch_resp.txt
            echo ""
            echo "  The hourly schedule safety-net cron will restart the chain within ≤60 min."
          else
            echo "✅ Next run queued successfully. Chain continues."
          fi
