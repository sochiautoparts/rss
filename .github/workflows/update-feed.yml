name: Update RSS Feed

on:
  schedule:
    # Every 30 minutes, STAGGERED onto off-peak minutes :13 and :43.
    #
    # IMPORTANT: GitHub Actions explicitly warns that scheduled workflows fired
    # at the top of the hour (:00 / :30) are heavily delayed or SKIPPED ENTIRELY
    # on the free tier, because millions of repos run cron jobs at exactly those
    # minutes. Using "*/30 * * * *" fires at :00 and :30 — the worst possible
    # slots. "13,43 * * * *" still runs every 30 minutes but dodges the peak
    # load window, so runs actually happen instead of being starved.
    #
    # Ref: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: "13,43 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "generate_feed.py"
      - "requirements.txt"
      - ".github/workflows/update-feed.yml"

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate feed
        run: python generate_feed.py

      - name: Write heartbeat marker (proves the cron actually fired)
        run: |
          python - <<'PY'
          import json, datetime
          data = {
              "last_run_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(timespec="seconds"),
              "trigger": "${{ github.event_name }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "schedule": "13,43 * * * * (every 30 min, off-peak)",
          }
          with open("last-run.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")
          print("heartbeat:", data)
          PY

      - name: Commit feed.xml + heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml last-run.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(feed): auto-update $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event_name }}]"
            git push
          fi

      - name: Upload feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-xml
          path: feed.xml
          retention-days: 7
